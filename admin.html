<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 尋遊桃仔園</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container { max-width: 800px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        input, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 0.8rem 2rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .mgmt-item { display: flex; justify-content: space-between; padding: 1rem 0; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h3>新增消息 / 文章 (Firestore 雲端版)</h3>
        <form id="post-form">
            <div class="form-group"><label>標題</label><input type="text" id="title" required></div>
            <div class="form-group"><label>內容</label><textarea id="content" rows="6"></textarea></div>
            <div class="form-group"><label>日期</label><input type="date" id="date" required></div>
            <div class="form-group"><label>影片 URL</label><input type="url" id="videoUrl"></div>
            <button type="submit">發佈到雲端</button>
        </form>
        <div id="admin-posts-list" style="margin-top: 2rem;">載入中...</div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const form = document.getElementById('post-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await db.collection("posts").add({
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                date: document.getElementById('date').value,
                videoUrl: document.getElementById('videoUrl').value
            });
            form.reset();
        });

        db.collection("posts").orderBy("date", "desc").onSnapshot(snapshot => {
            const list = document.getElementById('admin-posts-list');
            list.innerHTML = '<h4>文章列表</h4>';
            snapshot.forEach(doc => {
                const post = doc.data();
                const div = document.createElement('div');
                div.className = 'mgmt-item';
                div.innerHTML = `<span>${post.title}</span><button onclick="db.collection('posts').doc('${doc.id}').delete()">刪除</button>`;
                list.appendChild(div);
            });
        });
    </script>
</body>
</html>
