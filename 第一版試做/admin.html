<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理後台 - 尋遊桃仔園</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
            background: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
        }

        button {
            padding: 0.8rem 2rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }

        .posts-mgmt-list {
            margin-top: 3rem;
            border-top: 2px solid #eee;
            padding-top: 2rem;
        }

        .mgmt-item {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .btn-delete {
            background-color: #ff4d4d;
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }
    </style>
</head>

<body>
    <header>
        <div class="top-nav">
            <div class="logo">尋遊桃仔園 - 管理後台</div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">回前台</a></li>
                    <li><button id="admin-logout-btn"
                            style="background:none; border:none; color:inherit; cursor:pointer; font-family:inherit; font-size:inherit;">登出</button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="admin-container">
        <h3>新增消息 / 文章 (完整架構)</h3>
        <br>
        <form id="post-form">
            <div class="form-group" style="display: flex; gap: 1rem;">
                <div style="flex: 2;">
                    <label for="title">標題</label>
                    <input type="text" id="title" required placeholder="請輸入標題">
                </div>
                <div style="flex: 1;">
                    <label for="category">分類</label>
                    <input type="text" id="category" placeholder="例如：活動消息" list="categories">
                    <datalist id="categories">
                        <option value="活動消息">
                        <option value="學術研討">
                        <option value="課程成果">
                        <option value="工作坊">
                    </datalist>
                </div>
            </div>
            <div class="form-group">
                <label for="date">日期</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-group">
                <label for="imageUrl">圖片嵌入網址 (Optional)</label>
                <input type="url" id="imageUrl" placeholder="HTTPS 圖片網址 (例如：https://.../img.jpg)">
            </div>
            <div class="form-group">
                <label for="videoUrl">YouTube 影片網址 (Optional)</label>
                <input type="url" id="videoUrl"
                    placeholder="https://www.youtube.com/watch?v=... 或 https://youtu.be/...">
            </div>

            <!-- Real-time Preview Area -->
            <div id="media-preview"
                style="margin-bottom: 2rem; display: none; padding: 1rem; background: #f8f9fa; border: 1px dashed #ccc; border-radius: 8px;">
                <p style="font-size: 0.8rem; color: #666; margin-bottom: 0.5rem;">媒體預覽：</p>
                <div id="preview-container"></div>
            </div>

            <div class="form-group">
                <label for="content">內容</label>
                <textarea id="content" rows="8" placeholder="請輸入內文..."></textarea>
            </div>
            <button type="submit">發佈完整內容</button>
        </form>

        <div class="posts-mgmt-list">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                <h3>目前文章列表</h3>
                <button onclick="resetData()"
                    style="background-color: #f39c12; font-size: 0.75rem; padding: 0.3rem 0.6rem;">手機看不到新內容？點此修復同步</button>
            </div>
            <div id="admin-posts-list">
                <!-- Administrative list loaded here -->
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <script>
        let editingPostId = null;

        // Authentication Check
        auth.onAuthStateChanged((user) => {
            if (!user) {
                alert('請先登入管理員帳號');
                window.location.href = 'index.html';
            }
        });

        document.getElementById('admin-logout-btn').onclick = () => {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderAdminPosts();

            // Preview logic
            const imgInput = document.getElementById('imageUrl');
            const videoInput = document.getElementById('videoUrl');

            imgInput.addEventListener('input', updatePreview);
            videoInput.addEventListener('input', updatePreview);

            document.getElementById('post-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const title = document.getElementById('title').value;
                const category = document.getElementById('category').value;
                const date = document.getElementById('date').value;
                const imageUrl = document.getElementById('imageUrl').value;
                const videoUrl = document.getElementById('videoUrl').value;
                const content = document.getElementById('content').value;

                let posts = JSON.parse(localStorage.getItem('posts')) || [];

                if (editingPostId) {
                    // Update existing post
                    posts = posts.map(p => p.id === editingPostId ? {
                        ...p,
                        title, category, date, imageUrl, videoUrl, content
                    } : p);
                    editingPostId = null;
                    document.querySelector('button[type="submit"]').textContent = '發佈完整內容';
                } else {
                    // Create new post
                    const newPost = {
                        id: Date.now(),
                        title: title,
                        category: category,
                        date: date,
                        imageUrl: imageUrl,
                        videoUrl: videoUrl,
                        content: content
                    };
                    posts.unshift(newPost);
                }

                localStorage.setItem('posts', JSON.stringify(posts));
                e.target.reset();
                updatePreview(); // Clear preview after reset
                renderAdminPosts();
                alert('儲存成功！');
            });
        });

        function updatePreview() {
            const imageUrl = document.getElementById('imageUrl').value.trim();
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const previewSection = document.getElementById('media-preview');
            const previewContainer = document.getElementById('preview-container');

            if (imageUrl === '' && videoUrl === '') {
                previewSection.style.display = 'none';
                return;
            }

            previewSection.style.display = 'block';
            let previewHtml = '';

            if (imageUrl) {
                previewHtml += `<div style="margin-bottom:1rem;"><img src="${imageUrl}" style="max-width:200px; border-radius:4px; border:1px solid #ddd;" onerror="this.outerHTML='<p style=\'color:red; font-size:0.8rem;\'>圖片網址無效 (請檢查大小寫)</p>'"></div>`;
            }

            if (videoUrl) {
                const videoId = getYouTubeID(videoUrl);
                if (videoId) {
                    previewHtml += `<div style="color:green; font-size:0.8rem;">✓ YouTube 影片解析成功 (ID: ${videoId})</div>`;
                    previewHtml += `<div style="margin-top:0.5rem;"><iframe width="200" height="112" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe></div>`;
                    previewHtml += `<div style="font-size:0.7rem; color:#888; margin-top:0.5rem;">※ 若預覽框顯示「錯誤 153」，係因您以本地檔案開啟網頁，發布後點擊連結即可正常觀看。</div>`;
                } else {
                    previewHtml += `<div style="color:red; font-size:0.8rem;">✗ 影片網址格式錯誤，無法解析 ID</div>`;
                }
            }

            previewContainer.innerHTML = previewHtml;
        }

        function getYouTubeID(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        function renderAdminPosts() {
            const list = document.getElementById('admin-posts-list');
            const posts = JSON.parse(localStorage.getItem('posts')) || [];

            list.innerHTML = '';
            posts.forEach(post => {
                const item = document.createElement('div');
                item.className = 'mgmt-item';
                item.innerHTML = `
                    <span style="flex:1;">${post.title} (${post.date})</span>
                    <div style="display:flex; gap:0.5rem;">
                        <button onclick="editPost(${post.id})" style="background-color: #555; font-size: 0.8rem; padding: 0.4rem 0.8rem;">編輯</button>
                        <button class="btn-delete" onclick="deletePost(${post.id})">刪除</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        window.editPost = (id) => {
            const posts = JSON.parse(localStorage.getItem('posts')) || [];
            const post = posts.find(p => p.id === id);
            if (post) {
                editingPostId = id;
                document.getElementById('title').value = post.title;
                document.getElementById('category').value = post.category || '';
                document.getElementById('date').value = post.date;
                document.getElementById('imageUrl').value = post.imageUrl || '';
                document.getElementById('videoUrl').value = post.videoUrl || '';
                document.getElementById('content').value = post.content || '';

                document.querySelector('button[type="submit"]').textContent = '儲存更新內容';
                updatePreview(); // Show preview when editing
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.deletePost = (id) => {
            if (confirm('確定要刪除嗎？')) {
                let posts = JSON.parse(localStorage.getItem('posts')) || [];
                posts = posts.filter(p => p.id !== id);
                localStorage.setItem('posts', JSON.stringify(posts));
                renderAdminPosts();
            }
        };

        window.resetData = () => {
            if (confirm('這將會清除您目前在「這台設備」上新增的所有文章，並恢復為系統最新的預設內容。確定要執行嗎？')) {
                localStorage.removeItem('posts');
                alert('已清除舊資料，請重新整理頁面。');
                location.reload();
            }
        };
    </script>
</body>

</html>
