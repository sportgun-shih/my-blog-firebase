<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章詳情</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container" style="max-width: 800px; margin: 4rem auto; padding: 0 2rem;">
        <a href="index.html">← 返回首頁</a>
        <div id="post-display">載入中...</div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        db.collection("posts").doc(id).get().then(doc => {
            if (doc.exists) {
                const post = doc.data();
                document.getElementById('post-display').innerHTML = `
                    <h1>${post.title}</h1>
                    <p style="color: #666;">${post.date}</p>
                    <div style="white-space: pre-wrap;">${post.content}</div>
                `;
            } else {
                document.getElementById('post-display').innerHTML = '找不到文章';
            }
        });
    </script>
</body>
</html>
