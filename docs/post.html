<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章詳情 - 尋遊桃仔園 (雲端版)</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        .post-detail {
            max-width: 850px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .post-header {
            border-bottom: 2px solid var(--secondary-color);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
        }

        .post-meta {
            display: flex;
            gap: 1rem;
            color: #777;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .post-category {
            background: var(--primary-color);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: normal;
        }

        .post-title {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .post-content {
            font-size: 1.15rem;
            line-height: 2;
            color: #2c3e50;
            white-space: pre-wrap;
            margin-bottom: 3rem;
        }

        .media-container {
            position: relative;
            margin: 2rem 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .media-container img,
        .media-container iframe {
            width: 100%;
            display: block;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 2rem;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: bold;
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <header>
        <div class="top-nav">
            <a href="index.html" class="logo">尋遊桃仔園─數位人文鍊金術</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="admin.html" class="admin-link">管理員</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="post-detail reveal">
        <a href="index.html" class="back-btn">← 返回列表</a>
        <div id="post-display">
            <h1>載入中...</h1>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>

    <!-- 我們的設定檔 -->
    <script src="firebase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            const postDisplay = document.getElementById('post-display');
            
            // 啟動進場動畫
            setTimeout(() => {
                document.querySelector('.reveal').classList.add('active');
            }, 100);

            if (!postId) {
                postDisplay.innerHTML = '<h1>參數錯誤：未指定文章 ID</h1>';
                return;
            }

            try {
                // 從 Firestore 抓取特定文章
                const doc = await db.collection("posts").doc(postId).get();

                if (doc.exists) {
                    const post = doc.data();
                    let mediaHtml = '';

                    // Image Handling
                    if (post.imageUrl && post.imageUrl.trim() !== '') {
                        mediaHtml += `
                            <div class="media-container" id="img-container">
                                <img src="${post.imageUrl}" alt="Post Image" 
                                     onerror="handleImgError()">
                            </div>`;
                    }

                    // Video Handling
                    if (post.videoUrl && post.videoUrl.trim() !== '') {
                        const videoId = getYouTubeID(post.videoUrl);
                        if (videoId) {
                            mediaHtml += `
                                <div class="media-container video-wrapper">
                                    <iframe src="https://www.youtube.com/embed/${videoId}" 
                                            frameborder="0" 
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                            allowfullscreen></iframe>
                                </div>`;
                        }
                    }

                    // Panoee Handling
                    if (post.panoeeUrl && post.panoeeUrl.trim() !== '') {
                        mediaHtml += `
                            <div class="panoee-container">
                                <iframe src="${post.panoeeUrl}" allowfullscreen></iframe>
                            </div>`;
                    }

                    postDisplay.innerHTML = `
                        <div class="post-header">
                            <div class="post-meta">
                                <span class="post-category">${post.category || '未分類'}</span>
                                <span class="post-date">${post.date}</span>
                            </div>
                            <h1 class="post-title">${post.title}</h1>
                        </div>
                        ${mediaHtml}
                        <div class="post-content">${post.content || '暫無內文。'}</div>
                        <div id="interactive-qa-container"></div>
                    `;

                    // 初始化問答組件
                    if (post.questions && post.questions.length > 0) {
                        renderQA(post.questions);
                    }
                } else {
                    postDisplay.innerHTML = '<h1>找不到文章，可能已被刪除。</h1>';
                }
            } catch (err) {
                console.error("Fetch error:", err);
                postDisplay.innerHTML = '<h1>連線雲端失敗：' + err.message + '</h1>';
            }
        });

        function handleImgError() {
            const container = document.getElementById('img-container');
            if (container) {
                container.innerHTML = '<p style="padding:40px; text-align:center; color:#888; background:#f9f9f9;">圖片無法顯示</p>';
            }
        }

        function getYouTubeID(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // 問答組件渲染與邏輯
        let isMuted = false;

        function renderQA(questions) {
            const container = document.getElementById('interactive-qa-container');
            let currentQuestionIndex = 0;
            let userScore = 0;

            // 初始顯示「開始挑戰」覆蓋層
            container.innerHTML = `
                <section class="interactive-qa">
                    <div id="qa-game-content">
                        <div class="start-quiz-overlay">
                            <span style="font-size: 4rem; display: block; margin-bottom: 1rem;">🎯</span>
                            <h2 style="color: var(--primary-color); margin-bottom: 1.5rem;">準備好接受導覽挑戰了嗎？</h2>
                            <p style="margin-bottom: 2.5rem; color: #4a5568;">看完導覽了嗎？測試看看你記住了多少！答對越多，稱號越高唷！</p>
                            <button class="start-quiz-btn" onclick="startChallenge()">立即開始挑戰</button>
                        </div>
                    </div>
                </section>
            `;

            window.startChallenge = () => {
                const bgm = document.getElementById('audio-bgm');
                if(!isMuted) {
                  bgm.volume = 0.4;
                  bgm.play().catch(e => console.log("Audio blocked", e));
                }
                const gameContent = document.getElementById('qa-game-content');
                gameContent.innerHTML = `
                    <div class="qa-header">
                        <h2><span>🧠</span> 導覽挑戰進行中...</h2>
                        <button id="mute-toggle" class="mute-btn" title="切換靜音">${isMuted ? '🔇' : '🔊'}</button>
                    </div>
                    <div class="progress-container" style="margin-top: 0;">
                        <div class="progress-bar-fill" id="progress-bar-fill"></div>
                    </div>
                    <div id="qa-cards">
                        ${questions.map((q, index) => `
                            <div class="question-card ${index === 0 ? 'active' : ''}" id="qa-card-${index}">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                    <span style="color: var(--secondary-color); font-weight: bold;">第 ${index + 1} 題 / 共 ${questions.length} 題</span>
                                </div>
                                <p class="question-text">${q.text}</p>
                                <div class="options-grid">
                                    ${q.options.map((opt, optIdx) => `
                                        <button class="option-btn" onclick="checkAnswer(${index}, ${optIdx}, ${q.correctIndex}, '${(q.feedbackCorrect || q.feedback || '').replace(/'/g, "\\'")}', '${(q.feedbackWrong || '').replace(/'/g, "\\'")}')">
                                            ${opt}
                                            <span class="status-icon"></span>
                                        </button>
                                    `).join('')}
                                </div>
                                <div class="feedback-section" id="feedback-${index}"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="qa-footer">
                        <div class="progress-dots">
                            ${questions.map((_, index) => `<div class="dot ${index === 0 ? 'active' : ''}" id="dot-${index}"></div>`).join('')}
                        </div>
                        <button class="next-btn" id="next-qa-btn" onclick="showNextQuestion()">下一題</button>
                    </div>
                `;

                // 綁定靜音按鈕
                const muteBtn = document.getElementById('mute-toggle');
                muteBtn.onclick = () => {
                    isMuted = !isMuted;
                    muteBtn.textContent = isMuted ? '🔇' : '🔊';
                    const bgm = document.getElementById('audio-bgm');
                    if (isMuted) bgm.pause();
                    else bgm.play().catch(()=>{});
                    
                    document.getElementById('audio-correct').muted = isMuted;
                    document.getElementById('audio-wrong').muted = isMuted;
                    document.getElementById('audio-victory').muted = isMuted;
                };

                updateProgressBar();
            };

            function updateProgressBar() {
                const fill = document.getElementById('progress-bar-fill');
                const percent = (currentQuestionIndex / questions.length) * 100;
                fill.style.width = percent + '%';
            }

            window.checkAnswer = (qIdx, optIdx, correctIdx, feedbackCorrect, feedbackWrong) => {
                const card = document.getElementById(`qa-card-${qIdx}`);
                const options = card.querySelectorAll('.option-btn');
                const feedbackEl = document.getElementById(`feedback-${qIdx}`);
                const nextBtn = document.getElementById('next-qa-btn');
                
                // 停止其他按鈕點擊
                options.forEach(btn => btn.style.pointerEvents = 'none');
                
                const selectedBtn = options[optIdx];
                const isCorrect = optIdx === correctIdx;
                const feedbackText = isCorrect ? feedbackCorrect : (feedbackWrong || feedbackCorrect);
                
                if (isCorrect) {
                  userScore++;
                  if(!isMuted) document.getElementById('audio-correct').play().catch(()=>{});
                } else {
                  if(!isMuted) document.getElementById('audio-wrong').play().catch(()=>{});
                }
                
                selectedBtn.classList.add(isCorrect ? 'correct' : 'wrong');
                
                feedbackEl.innerHTML = `
                    <div class="feedback-content ${isCorrect ? 'feedback-success' : 'feedback-error'}">
                        <strong>${isCorrect ? '✅ 答對了！' : '❌ 再接再厲！'}</strong>
                        <p>${feedbackText}</p>
                    </div>
                `;
                feedbackEl.classList.add('show');
                
                // 更新進度點
                document.getElementById(`dot-${qIdx}`).classList.add('completed');
                
                // 顯示下一題按鈕 (如果是最後一題則顯示完成)
                nextBtn.classList.add('ready');
                if (qIdx === questions.length - 1) {
                    nextBtn.textContent = '完成教學';
                }
            };

            window.showNextQuestion = () => {
                if (currentQuestionIndex < questions.length - 1) {
                    // 隱藏目前題目
                    document.getElementById(`qa-card-${currentQuestionIndex}`).classList.remove('active');
                    document.getElementById(`dot-${currentQuestionIndex}`).classList.remove('active');
                    
                    currentQuestionIndex++;
                    
                    // 顯示下一題
                    document.getElementById(`qa-card-${currentQuestionIndex}`).classList.add('active');
                    document.getElementById(`dot-${currentQuestionIndex}`).classList.add('active');
                    
                    const nextBtn = document.getElementById('next-qa-btn');
                    nextBtn.classList.remove('ready');
                    updateProgressBar();
                } else {
                    renderResult();
                }
            };

            function renderResult() {
                updateProgressBar();
                const fill = document.getElementById('progress-bar-fill');
                fill.style.width = '100%';

                // 停止 BGM 並播放勝利音效
                document.getElementById('audio-bgm').pause();
                if(!isMuted) document.getElementById('audio-victory').play().catch(()=>{});

                const percent = Math.round((userScore / questions.length) * 100);
                let rank = { title: "漫遊旅人", badge: "🚶", color: "#718096" };

                if (percent === 100) {
                    rank = { title: "傳奇導覽大師", badge: "👑", color: "#8B0000" };
                    createConfetti();
                } else if (percent >= 70) {
                    rank = { title: "專業嚮導", badge: "🧭", color: "#D4AF37" };
                } else if (percent >= 40) {
                    rank = { title: "資深遊客", badge: "🎒", color: "#2c3e50" };
                }

                const gameContent = document.getElementById('qa-game-content');
                gameContent.innerHTML = `
                    <div class="result-card">
                        <span class="rank-badge">${rank.badge}</span>
                        <h2 class="rank-title">${rank.title}</h2>
                        <p class="score-text">挑戰完成！您的得分是 <strong>${percent}%</strong> (${userScore}/${questions.length})</p>
                        <button class="start-quiz-btn" onclick="location.reload()" style="font-size: 1rem; padding: 0.8rem 2rem;">再挑戰一次</button>
                    </div>
                `;
            }

            function createConfetti() {
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.animationDuration = (Math.random() * 2 + 1) + 's';
                    confetti.style.backgroundColor = ['#8B0000', '#D4AF37', '#005a8d', '#FFD700'][Math.floor(Math.random() * 4)];
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }
            }
        }
    </script>
    <!-- Audio Assets -->
    <audio id="audio-bgm" loop src="https://www.chosic.com/wp-content/uploads/2021/05/And-So-It-Begins-Inspired-By-Crush-By-Kevin-Macleod.mp3"></audio>
    <audio id="audio-correct" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="audio-wrong" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="audio-victory" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>
</body>

</html>
