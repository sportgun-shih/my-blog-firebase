<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋遊桃仔園 - 數位人文跨域人才培育計畫 (雲端版)</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="top-nav">
            <a href="index.html" class="logo">尋遊桃仔園─數位人文鍊金術</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="#">認識計畫</a></li>
                    <li><a href="admin.html" class="admin-link">管理員</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero reveal">
            <div class="hero-content">
                <h1 class="main-title">尋遊桃仔園</h1>
                <p class="sub-title">數位人文跨域人才培育計畫</p>
                <p class="sub-title" style="font-size: 1.4rem; margin-top: 0.5rem; color: var(--primary-color);">數位人文鍊金術課程成果</p>
                <div style="margin-top: 2rem;">
                    <span style="display: inline-block; width: 50px; height: 3px; background: var(--secondary-color);"></span>
                </div>
            </div>
        </section>

        <section class="container reveal">
            <div class="section-header">
                <h3 class="section-title">最新消息</h3>
                <a href="#" class="view-more">瀏覽全部 →</a>
            </div>

            <div class="news-list" id="news-container">
                <div class="news-item loading">即將從雲端讀取內容...</div>
            </div>
        </section>

        <section class="container reveal" style="margin-top: 4rem;">
            <div class="section-header">
                <h3 class="section-title">成果內容</h3>
                <a href="#" class="view-more">瀏覽全部 →</a>
            </div>

            <div class="tab-container" id="outcome-tabs">
                <div class="tab-item active" onclick="switchTab('環境虛擬導覽')">環境虛擬導覽</div>
                <div class="tab-item" onclick="switchTab('地圖故事走讀')">地圖故事走讀</div>
                <div class="tab-item" onclick="switchTab('文學影片自白')">文學影片自白</div>
            </div>

            <div class="news-list" id="outcome-container">
                <div class="news-item loading">即將從雲端讀取內容...</div>
            </div>
        </section>

        <section id="multimedia-section" class="multimedia-section reveal" style="display: none;">
            <div id="featured-video-container-inner" class="container" style="max-width: 1200px !important;">
                <div class="featured-video-grid">
                    <div class="video-info">
                        <span class="category-tag" id="featured-video-category">精選成果內容</span>
                        <h2 id="featured-video-title" style="font-size: 2.5rem; margin: 1rem 0; color: var(--primary-color);"></h2>
                        <p id="featured-video-excerpt" style="color: #4a5568; margin-bottom: 2rem;"></p>
                        <a id="featured-video-link" href="#" class="admin-link" style="display: inline-block; text-decoration: none;">閱讀完整文章 →</a>
                    </div>
                    <div id="latest-media-container" class="media-container" style="margin: 0; background: transparent; box-shadow: none;">
                        <!-- 影片容器 -->
                        <div id="featured-video-wrapper" class="video-wrapper" style="display: none; border-radius: 15px; overflow: hidden; box-shadow: var(--box-shadow);">
                            <iframe src="" title="YouTube video player" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <!-- Panoee 容器 -->
                        <div id="featured-panoee-wrapper" class="video-wrapper" style="display: none; border-radius: 15px; overflow: hidden; box-shadow: var(--box-shadow);">
                            <iframe src="" title="Panoee Virtual Tour" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <!-- 圖片容器 -->
                        <div id="featured-image-wrapper" style="display: none; border-radius: 15px; overflow: hidden; box-shadow: var(--box-shadow);">
                            <img id="featured-image" src="" alt="Featured Image" style="width: 100%; height: auto; display: block; object-fit: cover; max-height: 450px;">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 數位人文鍊金術 - 中原大學</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>

    <!-- 我們的設定檔 -->
    <script src="firebase-config.js"></script>

    <script>
        let currentSubCategory = '環境虛擬導覽';

        document.addEventListener('DOMContentLoaded', () => {
            loadPostsFromCloud();
            initReveal();
        });

        function switchTab(subCat) {
            currentSubCategory = subCat;
            // 更新 UI 狀態
            document.querySelectorAll('.tab-item').forEach(tab => {
                if (tab.textContent === subCat) tab.classList.add('active');
                else tab.classList.remove('active');
            });
            loadPostsFromCloud(); // 重新渲染
        }

        function initReveal() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        function loadPostsFromCloud() {
            const newsContainer = document.getElementById('news-container');
            const outcomeContainer = document.getElementById('outcome-container');
            const multimediaSection = document.getElementById('multimedia-section');
            const videoFrame = document.querySelector('#featured-video-wrapper iframe');
            const featuredVideoWrapper = document.getElementById('featured-video-wrapper');
            const featuredImageWrapper = document.getElementById('featured-image-wrapper');
            const featuredImage = document.getElementById('featured-image');
            const featuredPanoeeWrapper = document.getElementById('featured-panoee-wrapper');
            const panoeeFrame = document.querySelector('#featured-panoee-wrapper iframe');

                // 監聽雲端資料庫變化 (Real-time listener)
                db.collection("posts").orderBy("date", "desc").onSnapshot((querySnapshot) => {
                    newsContainer.innerHTML = '';
                    outcomeContainer.innerHTML = '';

                    if (querySnapshot.empty) {
                        newsContainer.innerHTML = '<div class="news-item">尚無內容。</div>';
                        outcomeContainer.innerHTML = '<div class="news-item">尚無內容。</div>';
                        multimediaSection.style.display = 'none';
                        return;
                    }

                    let featuredPost = null;

                    // 第一輪：尋找設定為「精選」的文章 (優先考慮有影像內容的)
                    querySnapshot.forEach((doc) => {
                        const post = doc.data();
                        if (!featuredPost && post.isFeatured && (post.videoUrl || post.imageUrl || post.panoeeUrl)) {
                            featuredPost = { ...post, id: doc.id };
                        }
                    });

                    // 第二輪：如果沒找到手動精選，則找最新的一篇含有影音的文章作為備案
                    if (!featuredPost) {
                        querySnapshot.forEach((doc) => {
                            const post = doc.data();
                            if (!featuredPost && (post.videoUrl || post.imageUrl || post.panoeeUrl)) {
                                featuredPost = { ...post, id: doc.id };
                            }
                        });
                    }

                // 第三輪：渲染新聞列表與成果內容
                let newsCount = 0;
                let outcomeCount = 0;

                querySnapshot.forEach((doc) => {
                    const post = doc.data();
                    const item = document.createElement('div');
                    item.className = 'news-item';
                    item.innerHTML = `
                        <div class="news-content">
                            <span class="category-tag">${post.category || '消息'}</span>
                            <a href="post.html?id=${doc.id}">${post.title}</a>
                        </div>
                        <span class="date">${post.date}</span>
                    `;
                    
                    if (post.category === '活動消息' || post.category === '學術研討' || post.category === '工作坊') {
                        // 最新消息限制顯示 3 個 (包含活動、研討、工作坊)
                        if (newsCount < 3) {
                            newsContainer.appendChild(item);
                        }
                        newsCount++;
                    } else if (post.category === '課程成果') {
                        // 課程成果專屬區塊，持續根據子類別過濾
                        if (post.subCategory === currentSubCategory) {
                             outcomeContainer.appendChild(item);
                             outcomeCount++;
                        }
                    }
                });

                if (newsCount === 0) newsContainer.innerHTML = '<div class="news-item">尚無最新活動消息。</div>';
                if (outcomeCount === 0) outcomeContainer.innerHTML = '<div class="news-item">此分類下尚無成果內容。</div>';

                // 處理精選區塊顯示
                if (featuredPost) {
                    const videoId = getYouTubeID(featuredPost.videoUrl);
                    
                    // 重置顯示狀態
                    featuredVideoWrapper.style.display = 'none';
                    featuredPanoeeWrapper.style.display = 'none';
                    featuredImageWrapper.style.display = 'none';
                    
                    if (featuredPost.panoeeUrl) {
                        // 優先顯示 Panoee 虛擬導覽
                        panoeeFrame.src = featuredPost.panoeeUrl;
                        featuredPanoeeWrapper.style.display = 'block';
                    } else if (videoId) {
                        // 顯示影片
                        videoFrame.src = `https://www.youtube.com/embed/${videoId}`;
                        featuredVideoWrapper.style.display = 'block';
                    } else if (featuredPost.imageUrl) {
                        // 顯示圖片
                        featuredImage.src = featuredPost.imageUrl;
                        featuredImageWrapper.style.display = 'block';
                    }

                    // 填入文字資訊
                    document.getElementById('featured-video-title').textContent = featuredPost.title;
                    document.getElementById('featured-video-category').textContent = featuredPost.category || '精選內容';
                    document.getElementById('featured-video-link').href = `post.html?id=${featuredPost.id}`;
                    
                    const excerpt = featuredPost.content ? featuredPost.content.replace(/<[^>]*>/g, '').substring(0, 100) + '...' : '';
                    document.getElementById('featured-video-excerpt').textContent = excerpt;

                    multimediaSection.style.display = 'block';
                } else {
                    multimediaSection.style.display = 'none';
                }
            }, (error) => {
                newsContainer.innerHTML = '<div class="news-item" style="color:red;">載入失敗：' + error.message + '</div>';
                outcomeContainer.innerHTML = '<div class="news-item" style="color:red;">載入失敗：' + error.message + '</div>';
            });
        }

        function getYouTubeID(url) {
            if (!url) return null;
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/|youtube\.com\/live\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }
    </script>
</body>

</html>
